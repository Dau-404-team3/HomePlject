services:
  - type: web
    name: cleaning-app-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AI_API_URL
        sync: false
      - key: AI_API_KEY
        sync: false
